name: TPE Regression

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly daily regression, 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  lint-and-smoke:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      WORK_DIR: ${{ github.workspace }}/sim/logs/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Verilator 5.050 build
        id: verilator-cache
        uses: actions/cache@v4
        with:
          path: ~/verilator-5.050
          key: verilator-5.050-${{ runner.os }}-v1

      - name: Build Verilator 5.050 from source
        if: steps.verilator-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git help2man perl python3 make autoconf g++ flex bison ccache \
            libgoogle-perftools-dev numactl perl-doc libfl2 libfl-dev zlib1g zlib1g-dev
          git clone --depth 1 --branch v5.050 https://github.com/verilator/verilator /tmp/verilator-src
          cd /tmp/verilator-src
          autoconf
          ./configure --prefix="$HOME/verilator-5.050"
          make -j"$(nproc)"
          make install

      - name: Add Verilator to PATH
        run: echo "$HOME/verilator-5.050/bin" >> "$GITHUB_PATH"

      - name: Install GTKWave
        run: |
          sudo apt-get update
          sudo apt-get install -y gtkwave

      - name: make venv
        run: make venv

      - name: run_sim -lint
        run: ./run_sim -lint

      - name: run_sim -suite smoke
        run: ./run_sim -suite smoke

      - name: Upload smoke regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-regression
          path: ${{ env.WORK_DIR }}/WORK/smoke/

  daily-regression:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      WORK_DIR: ${{ github.workspace }}/sim/logs/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Verilator 5.050 build
        id: verilator-cache
        uses: actions/cache@v4
        with:
          path: ~/verilator-5.050
          key: verilator-5.050-${{ runner.os }}-v1

      - name: Build Verilator 5.050 from source
        if: steps.verilator-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git help2man perl python3 make autoconf g++ flex bison ccache \
            libgoogle-perftools-dev numactl perl-doc libfl2 libfl-dev zlib1g zlib1g-dev
          git clone --depth 1 --branch v5.050 https://github.com/verilator/verilator /tmp/verilator-src
          cd /tmp/verilator-src
          autoconf
          ./configure --prefix="$HOME/verilator-5.050"
          make -j"$(nproc)"
          make install

      - name: Add Verilator to PATH
        run: echo "$HOME/verilator-5.050/bin" >> "$GITHUB_PATH"

      - name: Install GTKWave
        run: |
          sudo apt-get update
          sudo apt-get install -y gtkwave

      - name: make venv
        run: make venv

      - name: run_sim -suite daily
        # -coverage merges verif/model coverage the same way `make cov-merge`
        # used to (run_sim's -coverage flag calls tools/cov_merge.py itself,
        # see tools/run_sim.py's report_coverage()); -annotate additionally
        # writes an annotated coverage report alongside the merged summary.
        # No run_sim equivalent of the old `make profile` (tools/profiler.py)
        # step exists yet -- that tool reads regression.py's results.json,
        # which run_sim doesn't produce, so it's dropped here rather than
        # left silently broken.
        run: ./run_sim -suite daily -coverage -annotate

      - name: Upload daily regression + coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-regression
          path: ${{ env.WORK_DIR }}/WORK/daily/

  random-regression:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      WORK_DIR: ${{ github.workspace }}/sim/logs/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Verilator 5.050 build
        id: verilator-cache
        uses: actions/cache@v4
        with:
          path: ~/verilator-5.050
          key: verilator-5.050-${{ runner.os }}-v1

      - name: Build Verilator 5.050 from source
        if: steps.verilator-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git help2man perl python3 make autoconf g++ flex bison ccache \
            libgoogle-perftools-dev numactl perl-doc libfl2 libfl-dev zlib1g zlib1g-dev
          git clone --depth 1 --branch v5.050 https://github.com/verilator/verilator /tmp/verilator-src
          cd /tmp/verilator-src
          autoconf
          ./configure --prefix="$HOME/verilator-5.050"
          make -j"$(nproc)"
          make install

      - name: Add Verilator to PATH
        run: echo "$HOME/verilator-5.050/bin" >> "$GITHUB_PATH"

      - name: Install GTKWave
        run: |
          sudo apt-get update
          sudo apt-get install -y gtkwave

      - name: make venv
        run: make venv

      - name: run_sim -suite random
        run: ./run_sim -suite random

      - name: Upload random regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: random-regression
          path: ${{ env.WORK_DIR }}/WORK/random/
