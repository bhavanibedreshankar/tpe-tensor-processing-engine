name: Lint + Smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    env:
      WORK_DIR: ${{ github.workspace }}/sim/logs/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Verilator 5.050 build
        id: verilator-cache
        uses: actions/cache@v4
        with:
          path: ~/verilator-5.050
          key: verilator-5.050-${{ runner.os }}-v1

      - name: Build Verilator 5.050 from source
        if: steps.verilator-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git help2man perl python3 make autoconf g++ flex bison ccache \
            libgoogle-perftools-dev numactl perl-doc libfl2 libfl-dev zlib1g zlib1g-dev
          git clone --depth 1 --branch v5.050 https://github.com/verilator/verilator /tmp/verilator-src
          cd /tmp/verilator-src
          autoconf
          ./configure --prefix="$HOME/verilator-5.050"
          make -j"$(nproc)"
          make install

      - name: Add Verilator to PATH
        run: echo "$HOME/verilator-5.050/bin" >> "$GITHUB_PATH"

      - name: Install GTKWave + ccache
        # ccache here is NOT about speeding up this job's own compiles --
        # it's a hard dependency. Verilator's ./configure (in "Build
        # Verilator 5.050 from source" above) auto-detects ccache and
        # bakes `OBJCACHE = ccache` into every Vtop.mk it later generates.
        # That step only runs on a cache miss, so on a cache-hit run the
        # restored ~/verilator-5.050 still expects ccache on PATH even
        # though nothing installed it -- every compile fails with
        # "ccache: No such file or directory" (exit 127) otherwise.
        # Installed unconditionally (not folded into the from-source
        # step's own apt-get) so it's present on cache hits too.
        run: |
          sudo apt-get update
          sudo apt-get install -y gtkwave ccache

      - name: make venv
        run: make venv

      - name: run_sim -lint
        run: ./run_sim -lint

      - name: run_sim -suite smoke
        run: ./run_sim -suite smoke

      - name: Upload smoke regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-regression
          path: ${{ env.WORK_DIR }}/WORK/smoke/
